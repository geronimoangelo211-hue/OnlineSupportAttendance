<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Support Data Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="register-panel" id="loading-screen">
        <h3 style="color: #94a3b8;">Verifying secure link...</h3>
    </div>

    <div class="register-panel" id="register-form-container" style="display: none;">
        <h2>Online Support Data Register</h2>
        <p class="subtitle">Please fill out your official details below.</p>

        <form onsubmit="submitRegistration(event)">
            <input type="text" id="reg-name" placeholder="ALL CAPS - SURNAME, FIRST NAME, MIDDLE NAME" required>
            <input type="text" id="reg-id" placeholder="Student ID Number" required>
            
            <select id="reg-gc" onchange="toggleOtherGC(this.value)" required>
                <option value="">-- Select Group Chat Handle --</option>
                <option value="BSA">BSA</option>
                <option value="BSIT">BSIT</option>
                <option value="BSED ENG">BSED ENG</option>
                <option value="BSHM">BSHM</option>
                <option value="BSCRIM">BSCRIM</option>
                <option value="BSN">BSN</option>
                <option value="Other">Other (Specify)</option>
            </select>
            <input type="text" id="reg-gc-other" placeholder="Specify Handle" style="display: none; margin-top: 5px;">

            <label class="schedule-label">Select Your Assigned Days:</label>
            <div class="days-grid">
                <label class="day-checkbox"><input type="checkbox" name="schedule" value="Monday"> Monday</label>
                <label class="day-checkbox"><input type="checkbox" name="schedule" value="Tuesday"> Tuesday</label>
                <label class="day-checkbox"><input type="checkbox" name="schedule" value="Wednesday"> Wednesday</label>
                <label class="day-checkbox"><input type="checkbox" name="schedule" value="Thursday"> Thursday</label>
                <label class="day-checkbox"><input type="checkbox" name="schedule" value="Friday"> Friday</label>
                <label class="day-checkbox"><input type="checkbox" name="schedule" value="Saturday"> Saturday</label>
                <label class="day-checkbox"><input type="checkbox" name="schedule" value="Sunday"> Sunday</label>
            </div>

            <button type="submit" class="submit-btn">SUBMIT REGISTRATION</button>
        </form>
    </div>

    <script src="register.js"></script>
</body>
</html>
